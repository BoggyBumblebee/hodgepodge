name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests with coverage
        run: |
          mkdir -p BuildArtifacts
          xcodebuild \
            -project Hodgepodge.xcodeproj \
            -scheme Hodgepodge \
            -destination 'platform=macOS' \
            -derivedDataPath .build/DerivedData \
            -resultBundlePath BuildArtifacts/Hodgepodge.xcresult \
            test CODE_SIGNING_ALLOWED=NO

      - name: Export coverage report
        run: |
          mkdir -p BuildArtifacts
          xcrun xccov view --report BuildArtifacts/Hodgepodge.xcresult > BuildArtifacts/coverage.txt
          Scripts/xccov-to-sonar-generic.sh BuildArtifacts/Hodgepodge.xcresult BuildArtifacts/sonar-generic-coverage.xml
          python3 Scripts/xcresult-to-sonar-test-execution.py BuildArtifacts/Hodgepodge.xcresult BuildArtifacts/sonar-test-execution.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hodgepodge-ci-artifacts
          path: |
            BuildArtifacts/Hodgepodge.xcresult
            BuildArtifacts/coverage.txt
            BuildArtifacts/sonar-generic-coverage.xml
            BuildArtifacts/sonar-test-execution.xml
